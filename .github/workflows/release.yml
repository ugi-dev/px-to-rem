name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: px-to-rem-lsp-0.1.0-darwin-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: px-to-rem-lsp-0.1.0-darwin-x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: px-to-rem-lsp-0.1.0-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset: px-to-rem-lsp-0.1.0-linux-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: px-to-rem-lsp-0.1.0-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-zigbuild + zig (Linux)
        if: runner.os == 'Linux'
        run: |
          pip install ziglang
          cargo install cargo-zigbuild

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: cargo zigbuild -p px-to-rem-lsp --release --target ${{ matrix.target }}

      - name: Build (macOS / Windows)
        if: runner.os != 'Linux'
        run: cargo build -p px-to-rem-lsp --release --target ${{ matrix.target }}

      - name: Stage binary (Unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/px-to-rem-lsp ${{ matrix.asset }}

      - name: Stage binary (Windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/px-to-rem-lsp.exe ${{ matrix.asset }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: px-to-rem-lsp-*
          generate_release_notes: true
